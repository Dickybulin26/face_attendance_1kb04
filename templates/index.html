{% extends "base.html" %} 

{% block title %}Smart Scan Pro - Face HUD{% endblock %} 

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
    /* UI HUD: Face Tracker & Ring */
    #face-guideline {
        position: absolute;
        display: none; /* Muncul via JS */
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 50;
        transition: transform 0.1s ease-out;
    }

    /* Progress Ring SVG */
    .progress-ring-svg {
        position: absolute;
        width: 120%;
        height: 120%;
        transform: rotate(-90deg);
    }

    .progress-ring-circle {
        fill: none;
        stroke: var(--accent);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 251.2;
        stroke-dashoffset: 251.2;
        transition: stroke-dashoffset 0.2s ease;
    }

    /* Tag Label Status */
    .scan-label-tag {
        position: absolute;
        bottom: -50px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        color: var(--accent);
        padding: 5px 15px;
        border-radius: 100px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 1px;
        white-space: nowrap;
        border: 1px solid var(--border-tech);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
    }

    /* State saat Sukses */
    .locked-state .progress-ring-circle { stroke: #10b981; }
    .locked-state .corner { border-color: #10b981; }
    .locked-state .scan-label-tag { color: #10b981; border-color: #10b981; }
</style>
{% endblock %}

{% block content %}
<main class="max-w-7xl mx-auto p-6 flex items-center justify-center min-h-[calc(100vh-100px)]">
    <div class="w-full grid lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-8 relative">
            <div id="cam-container" class="video-container aspect-video shadow-2xl relative overflow-hidden bg-slate-900 rounded-3xl border border-white/5">
                
                <div class="absolute top-5 left-5 z-50 bg-black/60 backdrop-blur-md p-3 px-4 rounded-xl flex items-center gap-3 border border-white/10">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span id="status-text" class="text-white font-bold text-[10px] tracking-widest uppercase">Biometric Active</span>
                </div>

                <video id="video" autoplay muted playsinline class="w-full h-full object-cover scale-x-[-1]"></video>

                <div id="face-guideline">
                    <div class="corner top-left"></div>
                    <div class="corner top-right"></div>
                    <div class="corner bottom-left"></div>
                    <div class="corner bottom-right"></div>

                    <svg class="progress-ring-svg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.05)" stroke-width="2" fill="none" />
                        <circle id="loading-circle" class="progress-ring-circle" cx="50" cy="50" r="40" />
                    </svg>

                    <div id="scan-label" class="scan-label-tag">SEARCHING...</div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="blue-glass p-5 border-white/10 flex flex-col h-full max-h-[500px]">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-4">Daftar Hadir</h3>
                <div id="today-logs" class="space-y-2 overflow-y-auto custom-scrollbar flex-1 pr-2">
                    </div>
            </div>
        </div>
    </div>
</main>

<canvas id="canvas" class="hidden"></canvas>
{% endblock %}
